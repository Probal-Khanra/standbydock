name: standby_dock
description: A standby mode dock application for Android horizontal charging docks.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  wakelock_plus: ^1.6.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  http: ^1.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
